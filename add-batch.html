<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Stock</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <a href="index.html">← Back</a>
        <h1>Add Stock (Inventory)</h1>
        <div class="card">
            <label>Select Product:</label>
            <select id="select-product"><option>Loading...</option></select>
            
            <label>Expiry Date:</label>
            <input type="date" id="expiry-date">
            
            <label>Quantity:</label>
            <input type="number" id="quantity" placeholder="Ex: 50">
            
            <button id="btn-save-batch" class="btn-primary">Add to Stock</button>
        </div>
    </div>

    <script type="module">
        import { db } from './js/firebase.js';
        import { collection, getDocs, addDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const select = document.getElementById('select-product');
        
        // Dropdown-e product list ana
        async function loadProds() {
            const snap = await getDocs(collection(db, "products"));
            select.innerHTML = "";
            if(snap.empty) {
                select.innerHTML = "<option>No product found! Add product first.</option>";
                return;
            }
            snap.forEach(doc => {
                select.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`;
            });
        }

        document.getElementById('btn-save-batch').onclick = async () => {
            const dateVal = document.getElementById('expiry-date').value;
            const qty = document.getElementById('quantity').value;

            if(!dateVal || !qty) return alert("Date and Quantity are required!");

            await addDoc(collection(db, "batches"), {
                productId: select.value,
                productName: select.options[select.selectedIndex].text,
                expiryDate: Timestamp.fromDate(new Date(dateVal)),
                quantity: parseInt(qty),
                createdAt: new Date()
            });
            alert("Stock Updated!");
            window.location.href = "index.html";
        };
        loadProds();
    </script>
</body>
</html>
