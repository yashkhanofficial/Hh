<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Stock - Happy Expire</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <a href="index.html">← Back</a>
        <h1>Add Stock (Batch)</h1>
        <div class="card">
            <select id="select-product"><option>Loading Products...</option></select>
            <label>Expiry Date:</label>
            <input type="date" id="expiry-date">
            <input type="number" id="quantity" placeholder="Quantity">
            <button id="btn-save-batch" class="btn-primary">Add to Inventory</button>
        </div>
    </div>
    <script type="module">
        import { db } from './js/firebase.js';
        import { collection, getDocs, addDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"; // Note: Use same version as firebase.js

        const select = document.getElementById('select-product');
        
        async function loadProds() {
            const snap = await getDocs(collection(db, "products"));
            select.innerHTML = "";
            snap.forEach(doc => {
                select.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`;
            });
        }

        document.getElementById('btn-save-batch').onclick = async () => {
            const dateVal = document.getElementById('expiry-date').value;
            if(!dateVal) return alert("Date din!");
            await addDoc(collection(db, "batches"), {
                productId: select.value,
                productName: select.options[select.selectedIndex].text,
                expiryDate: Timestamp.fromDate(new Date(dateVal)),
                quantity: parseInt(document.getElementById('quantity').value),
                createdAt: new Date()
            });
            alert("Stock Added!");
            window.location.href = "index.html";
        };
        loadProds();
    </script>
</body>
</html>
