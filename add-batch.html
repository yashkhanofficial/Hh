<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Stock</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <a href="index.html">← Back</a>
        <h1>Add Stock</h1>
        <div class="card">
            <select id="prod-select"></select>
            <input type="date" id="exp-date">
            <input type="number" id="qty" placeholder="Quantity">
            <button onclick="addStock()" class="btn-primary">Add to Inventory</button>
        </div>
    </div>

    <script>
        const products = JSON.parse(localStorage.getItem('products') || '[]');
        const select = document.getElementById('prod-select');
        
        products.forEach(p => {
            select.innerHTML += `<option value="${p.id}">${p.name}</option>`;
        });

        function addStock() {
            const batches = JSON.parse(localStorage.getItem('batches') || '[]');
            const newBatch = {
                id: Date.now(),
                productId: select.value,
                productName: select.options[select.selectedIndex].text,
                expiryDate: document.getElementById('exp-date').value,
                quantity: parseInt(document.getElementById('qty').value)
            };
            batches.push(newBatch);
            localStorage.setItem('batches', JSON.stringify(batches));
            alert("Stock Added!");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
