<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>
    <div class="container">
        <a href="index.html">← Back</a>
        <h2>📦 Add Piece by Piece</h2>
        
        <div class="card">
            <video id="video" style="width:100%; border-radius:10px; background:black;"></video>
            <p id="cam-status" style="font-size:10px; color:gray;">Camera Active...</p>
        </div>

        <div class="card">
            <label>Select Item:</label>
            <select id="p-select"></select>
            <label>Expiry Date:</label>
            <input type="date" id="exp-date">
            <label>Unit Code:</label>
            <input type="text" id="unit-code" placeholder="Scanned Code will appear here">
            <button onclick="addUnit()" class="btn-primary">Add Unit to Stock</button>
        </div>
    </div>

    <script src="js/logic.js"></script>
    <script>
        const codeReader = new ZXing.BrowserMultiFormatReader();
        codeReader.decodeFromVideoDevice(null, 'video', (result) => {
            if (result) {
                document.getElementById('unit-code').value = result.text;
                // Optional: Auto-click add if you want fast adding
            }
        });

        window.onload = () => {
            const db = getDB();
            const select = document.getElementById('p-select');
            db.products.forEach(p => select.innerHTML += `<option value="${p.id}">${p.name}</option>`);
        };

        function addUnit() {
            const db = getDB();
            const code = document.getElementById('unit-code').value;
            const date = document.getElementById('exp-date').value;
            const pId = document.getElementById('p-select').value;
            const pName = document.getElementById('p-select').options[document.getElementById('p-select').selectedIndex].text;

            if(!code || !date) return alert("Fill Code and Date!");
            if(db.stocks.find(s => s.code === code)) return alert("This Code already added!");

            db.stocks.push({ code, pId, pName, expiry: date });
            saveDB(db);
            document.getElementById('unit-code').value = "";
            alert("Added!");
        }
    </script>
</body>
</html>
