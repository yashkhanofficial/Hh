<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Expire - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <span class="logo">⌛ Happy Expire</span>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="scanner.html">Scanner</a>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">Critical: <span id="count-red" class="text-critical">0</span></div>
            <div class="stat-card">Warning: <span id="count-yellow" class="text-warning">0</span></div>
        </div>

        <h2>Expiry Alerts</h2>
        <div class="alert-section">
            <h3 class="text-critical">🔴 Critical (3 Days)</h3>
            <div id="list-3-days" class="alert-list"></div>
            
            <h3 class="text-warning">🟡 Warning (7 Days)</h3>
            <div id="list-7-days" class="alert-list"></div>
            
            <h3 class="text-safe">🟢 Upcoming (30 Days)</h3>
            <div id="list-30-days" class="alert-list"></div>
        </div>

        <div class="fab-container">
            <a href="scanner.html" class="fab">📷 Scan & Sell</a>
            <a href="add-batch.html" class="fab">📦 Add Stock</a>
        </div>
    </div>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
