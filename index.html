<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Expire - Offline POS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">HAPPY EXPIRE (OFFLINE)</div>
    
    <div class="container">
        <div class="stat-grid">
            <div class="stat-item">Products <span id="total-p">0</span></div>
            <div class="stat-item">Total Stock <span id="total-s">0</span></div>
        </div>

        <h2 class="text-critical">🔴 Critical (3 Days)</h2>
        <div id="list-3" class="alert-list"></div>

        <h2 class="text-warning">🟡 Warning (7 Days)</h2>
        <div id="list-7" class="alert-list"></div>

        <h2 class="text-safe">🟢 Upcoming (30 Days)</h2>
        <div id="list-30" class="alert-list"></div>
        
        <button onclick="exportData()" class="btn-secondary" style="margin-top:20px;">💾 Backup Data (JSON)</button>
    </div>

    <div class="fab-nav">
        <a href="index.html" class="nav-item active">🏠<br>Home</a>
        <a href="products.html" class="nav-item">📋<br>Add Item</a>
        <a href="add-batch.html" class="nav-item">📦<br>Add Stock</a>
        <a href="scanner.html" class="nav-item">📷<br>Scan/Sell</a>
    </div>

    <script src="js/logic.js"></script>
    <script>
        window.onload = () => {
            updateStats();
            renderDashboardAlerts();
        };
        
        function exportData() {
            const data = {
                products: JSON.parse(localStorage.getItem('products') || '[]'),
                batches: JSON.parse(localStorage.getItem('batches') || '[]'),
                sales: JSON.parse(localStorage.getItem('sales') || '[]')
            };
            const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_${new Date().toLocaleDateString()}.json`;
            a.click();
        }
    </script>
</body>
</html>
