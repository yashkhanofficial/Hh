<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Expire</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">HAPPY EXPIRE PRO</div>
    
    <div class="container">
        <div class="stat-grid">
            <div class="stat-item">Items <span id="total-items">0</span></div>
            <div class="stat-item">Stock <span id="total-stock">0</span></div>
        </div>

        <h2>🔴 Critical Expiry (7 Days)</h2>
        <div id="expiry-list"></div>
    </div>

    <div class="fab-nav">
        <a href="index.html" class="nav-item active">🏠<br>Home</a>
        <a href="products.html" class="nav-item">📋<br>Profiles</a>
        <a href="add-stock.html" class="nav-item">📦<br>Add</a>
        <a href="scanner.html" class="nav-item">📷<br>Scan</a>
    </div>

    <script>
        const products = JSON.parse(localStorage.getItem('he_products') || '[]');
        const stocks = JSON.parse(localStorage.getItem('he_stocks') || '[]');

        document.getElementById('total-items').innerText = products.length;
        document.getElementById('total-stock').innerText = stocks.length;

        const expiryList = document.getElementById('expiry-list');
        const now = new Date();

        stocks.forEach(s => {
            const exp = new Date(s.expiry);
            const diff = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
            if(diff <= 7) {
                expiryList.innerHTML += `
                    <div class="card item-row">
                        <div><b>${s.pName}</b><br><small>Code: ${s.unitCode}</small></div>
                        <div class="badge badge-red">${diff} Days Left</div>
                    </div>`;
            }
        });
    </script>
</body>
</html>
