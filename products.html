<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <a href="index.html">← Back</a>
        <h2>➕ Create Product</h2>
        <div class="card">
            <input type="text" id="p-name" placeholder="Product Name">
            <input type="text" id="p-barcode" placeholder="Barcode (Scan or Type)">
            <input type="text" id="p-cat" placeholder="Category">
            <button onclick="addNewProduct()" class="btn-primary">Save Profile</button>
        </div>
        <h3>Registered List</h3>
        <div id="p-list-container"></div>
    </div>
    <script src="js/logic.js"></script>
    <script>
        window.onload = renderProductList;
        function addNewProduct() {
            const name = document.getElementById('p-name').value;
            const barcode = document.getElementById('p-barcode').value;
            const category = document.getElementById('p-cat').value;
            if(!name || !barcode) return alert("Fill Name and Barcode!");

            const products = JSON.parse(localStorage.getItem('products') || '[]');
            products.push({ id: Date.now(), name, barcode, category });
            localStorage.setItem('products', JSON.stringify(products));
            location.reload();
        }
    </script>
</body>
</html>
