<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <a href="index.html">← Back</a>
        <h2>📋 Product Profiles</h2>
        <div class="card">
            <input type="text" id="p-name" placeholder="Item Name (Ex: Lux Soap)">
            <button onclick="saveProfile()" class="btn-primary">Save Profile</button>
        </div>
        <h3>Existing Profiles</h3>
        <div id="profile-list"></div>
    </div>
    <script src="js/logic.js"></script>
    <script>
        window.onload = renderProfiles;
        function saveProfile() {
            const name = document.getElementById('p-name').value;
            if(!name) return;
            const db = getDB();
            db.products.push({ id: Date.now(), name });
            saveDB(db);
            location.reload();
        }
        function renderProfiles() {
            const db = getDB();
            const container = document.getElementById('profile-list');
            container.innerHTML = db.products.map(p => `
                <div class="card item-row">
                    <span>${p.name}</span>
                    <button onclick="deleteProduct(${p.id})" style="width:auto; background:red; padding:5px 10px;">Delete</button>
                </div>
            `).join('');
        }
        function deleteProduct(id) {
            if(!confirm("Are you sure? It will delete all stock for this product!")) return;
            const db = getDB();
            db.products = db.products.filter(p => p.id !== id);
            db.stocks = db.stocks.filter(s => s.pId != id);
            saveDB(db);
            location.reload();
        }
    </script>
</body>
</html>
