<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Product</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <a href="index.html">← Back</a>
        <h1>New Product Profile</h1>
        <div class="card">
            <input type="text" id="p-name" placeholder="Product Name">
            <input type="text" id="p-code" placeholder="Barcode/Code">
            <button onclick="saveProduct()" class="btn-primary">Save Product</button>
        </div>
        <div id="p-list"></div>
    </div>

    <script>
        function saveProduct() {
            const name = document.getElementById('p-name').value;
            const code = document.getElementById('p-code').value;
            if(!name || !code) return alert("Fill all fields");

            const products = JSON.parse(localStorage.getItem('products') || '[]');
            products.push({ id: Date.now(), name, code });
            localStorage.setItem('products', JSON.stringify(products));
            alert("Saved!");
            location.reload();
        }
    </script>
</body>
</html>
