<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <a href="index.html">← Back</a>
        <h1>Search & Sell</h1>
        <div class="card">
            <input type="text" id="scan-input" placeholder="Enter Product Code">
            <button onclick="search()" class="btn-primary">Search</button>
        </div>
        <div id="res" class="card" style="display:none;">
            <h2 id="res-name"></h2>
            <p id="res-stock"></p>
            <button onclick="sell()" class="btn-primary" style="background:red;">Sell 1 Unit</button>
        </div>
    </div>

    <script>
        let foundProductId = null;

        function search() {
            const code = document.getElementById('scan-input').value;
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            const p = products.find(x => x.code === code);

            if(p) {
                foundProductId = p.id;
                document.getElementById('res-name').innerText = p.name;
                document.getElementById('res').style.display = "block";
                
                const batches = JSON.parse(localStorage.getItem('batches') || '[]');
                const stock = batches.filter(b => b.productId == p.id).reduce((sum, b) => sum + b.quantity, 0);
                document.getElementById('res-stock').innerText = "Stock: " + stock;
            } else { alert("Not found!"); }
        }

        function sell() {
            let batches = JSON.parse(localStorage.getItem('batches') || '[]');
            // FIFO Logic: Sort by date
            batches.sort((a, b) => new Date(a.expiryDate) - new Date(b.expiryDate));
            
            const batchIndex = batches.findIndex(b => b.productId == foundProductId && b.quantity > 0);
            if(batchIndex > -1) {
                batches[batchIndex].quantity -= 1;
                localStorage.setItem('batches', JSON.stringify(batches));
                alert("Sold!");
                search();
            } else { alert("No Stock!"); }
        }
    </script>
</body>
</html>
