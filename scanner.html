<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <a href="index.html">← Back</a>
        <h2>📷 Scan to Sell (FIFO)</h2>
        <div class="card">
            <input type="text" id="scan-input" placeholder="Scan Barcode..." autofocus oninput="handleScan(this.value)">
        </div>
        <div id="sale-result"></div>
    </div>
    <script src="js/logic.js"></script>
    <script>
        function handleScan(code) {
            const products = JSON.parse(localStorage.getItem('products') || '[]');
            const prod = products.find(p => p.barcode === code);
            if(prod) {
                const success = processFIFOSale(prod.id);
                if(success) {
                    document.getElementById('sale-result').innerHTML = `
                    <div class="card" style="background:#dcfce7; border:2px solid green;">
                        <h3>✅ Sold: ${prod.name}</h3>
                        <p>Stock updated automatically.</p>
                    </div>`;
                    document.getElementById('scan-input').value = "";
                }
            }
        }
    </script>
</body>
</html>
