<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>
    <div class="container">
        <a href="index.html">← Back</a>
        <h2>📷 Quick Scan Sale</h2>
        <div class="card">
            <video id="video-sale" style="width:100%; border-radius:10px; background:black;"></video>
        </div>
        <div class="card">
            <input type="text" id="manual-code" placeholder="Manual Code">
            <button onclick="sellByCode(document.getElementById('manual-code').value)" class="btn-primary">Sell Manual</button>
        </div>
        <div id="sale-msg"></div>
    </div>

    <script src="js/logic.js"></script>
    <script>
        const codeReader = new ZXing.BrowserMultiFormatReader();
        codeReader.decodeFromVideoDevice(null, 'video-sale', (result) => {
            if (result) {
                sellByCode(result.text);
            }
        });

        function sellByCode(code) {
            const db = getDB();
            const index = db.stocks.findIndex(s => s.code === code);
            if(index > -1) {
                const item = db.stocks[index];
                db.stocks.splice(index, 1);
                saveDB(db);
                document.getElementById('sale-msg').innerHTML = `<div class="card" style="border-left:5px solid green;">Sold: ${item.pName} (${item.code})</div>`;
                alert("Sale Success!");
            } else {
                alert("Product Not Found in Stock!");
            }
        }
    </script>
</body>
</html>
