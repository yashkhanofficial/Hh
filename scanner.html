<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h2>📷 Quick Scan Sale</h2>
        <div class="card">
            <input type="text" id="scan-sell" placeholder="Scan Unit Barcode to Sell..." autofocus oninput="processSale(this.value)">
        </div>
        <div id="sale-info"></div>
    </div>

    <div class="fab-nav">
        <a href="index.html" class="nav-item">🏠<br>Home</a>
        <a href="products.html" class="nav-item">📋<br>Profiles</a>
        <a href="add-stock.html" class="nav-item">📦<br>Add</a>
        <a href="scanner.html" class="nav-item active">📷<br>Scan</a>
    </div>

    <script>
        function processSale(code) {
            if(!code) return;
            let stocks = JSON.parse(localStorage.getItem('he_stocks') || '[]');
            const index = stocks.findIndex(s => s.unitCode === code);

            if(index > -1) {
                const soldItem = stocks[index];
                document.getElementById('sale-info').innerHTML = `
                    <div class="card" style="border-left: 5px solid green">
                        <h3 style="color:green">✅ SOLD!</h3>
                        <b>${soldItem.pName}</b><br>
                        Code: ${soldItem.unitCode}<br>
                        Expiry: ${soldItem.expiry}
                    </div>`;
                
                stocks.splice(index, 1); // Remove from stock
                localStorage.setItem('he_stocks', JSON.stringify(stocks));
                document.getElementById('scan-sell').value = ""; // Ready for next scan
            }
        }
    </script>
</body>
</html>
